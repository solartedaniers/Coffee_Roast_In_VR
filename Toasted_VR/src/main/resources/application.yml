server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: Toasted_VR
  config:
    import: optional:file:./.env[.properties],optional:file:./Toasted_VR/.env[.properties]

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/toasted_vr_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

  jpa:
    database-platform: ${JPA_DATABASE_PLATFORM:org.hibernate.dialect.PostgreSQLDialect}
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
  mail:
    enabled: ${MAIL_ENABLED:false}
    from: ${MAIL_FROM:${MAIL_USERNAME:no-reply@toastedvr.local}}
  verification:
    code-length: ${VERIFICATION_CODE_LENGTH:6}
    code-expiration-minutes: ${VERIFICATION_CODE_EXPIRATION_MINUTES:2}
